<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Cam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-[#0f0f0f] flex items-center justify-between px-4 h-14 border-b border-[#272727]">
            <div class="flex items-center gap-4">
                <i data-lucide="menu" class="cursor-pointer"></i>
                <div class="flex items-center gap-1 cursor-pointer" onclick="renderView('home')">
                    <div class="bg-red-600 rounded-lg p-1"><i data-lucide="film" class="text-white"></i></div>
                    <span class="text-xl font-bold tracking-tighter">YouTube Cam</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleUpload(true)" class="p-2 hover:bg-[#272727] rounded-full"><i data-lucide="video"></i></button>
                <button class="p-2 hover:bg-[#272727] rounded-full"><i data-lucide="bell"></i></button>
            </div>
        </header>

        <!-- Main -->
        <main id="main-content" class="flex-1 overflow-y-auto p-6"></main>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-[#1e1e1e] w-full max-w-md p-6 rounded-xl relative">
            <button onclick="toggleUpload(false)" class="absolute top-4 right-4"><i data-lucide="x"></i></button>
            <h2 id="modal-title" class="text-xl font-bold mb-6">Select Video</h2>
            <div id="upload-step-select">
                <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-[#303030] py-12 flex flex-col items-center gap-4 cursor-pointer hover:border-red-600">
                    <i data-lucide="upload" class="text-gray-500 w-12 h-12"></i>
                    <p>Click to select a local video file</p>
                </div>
            </div>
            <div id="upload-step-details" class="hidden flex flex-col gap-4">
                <input type="text" id="video-title" placeholder="Video Title" class="w-full bg-[#121212] border border-[#303030] p-3 rounded">
                <input type="text" id="thumbnail-url" placeholder="Thumbnail URL" class="w-full bg-[#121212] border border-[#303030] p-3 rounded">
                <button onclick="finalizeUpload()" class="w-full bg-red-600 py-3 rounded font-bold hover:bg-red-700">Upload</button>
            </div>
        </div>
    </div>
    <input type="file" id="file-input" accept="video/*" class="hidden" onchange="handleFileSelect(event)">

    <script>
        let videos = JSON.parse(localStorage.getItem('yt-cam-data-v6') || '[]');
        let currentView = 'home';

        function saveVideos() { localStorage.setItem('yt-cam-data-v6', JSON.stringify(videos)); }

        function toggleUpload(show) { document.getElementById('upload-modal').classList.toggle('hidden', !show); }

        function handleFileSelect(e) {
            const tempFile = e.target.files[0];
            if(!tempFile) return;
            // Store file reference in a temporary global to use on save
            window.pendingFile = tempFile;
            document.getElementById('upload-step-select').classList.add('hidden');
            document.getElementById('upload-step-details').classList.remove('hidden');
            document.getElementById('modal-title').innerText = 'Video Details';
        }

        function finalizeUpload() {
            const title = document.getElementById('video-title').value;
            if(window.pendingFile && title) {
                const newVideo = { 
                    id: Date.now(), 
                    title, 
                    thumbnail: document.getElementById('thumbnail-url').value, 
                    localUrl: URL.createObjectURL(window.pendingFile),
                    views: 0,
                    likes: 0,
                    comments: []
                };
                videos.unshift(newVideo);
                saveVideos();
                toggleUpload(false);
                renderView('home');
                window.pendingFile = null;
            }
        }

        function toggleLike(videoId) {
            const video = videos.find(v => v.id === videoId);
            if(video) {
                video.likes++;
                saveVideos();
                renderView('watch', video);
            }
        }

        function addComment(videoId) {
            const input = document.getElementById('comment-input');
            if(!input.value.trim()) return;
            const video = videos.find(v => v.id === videoId);
            if(video) {
                video.comments.unshift(input.value);
                saveVideos();
                renderView('watch', video);
            }
        }

        function renderView(view, video = null) {
            currentView = view;
            const main = document.getElementById('main-content');
            
            if(view === 'home') {
                if(videos.length === 0) {
                    main.innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-4 text-center">
                        <i data-lucide="film" class="w-16 h-16 text-[#303030]"></i>
                        <h2 class="text-2xl font-bold">No videos yet</h2>
                        <p class="text-gray-400">Click the upload icon in the header to add your first video!</p>
                        <button onclick="toggleUpload(true)" class="bg-red-600 px-8 py-3 rounded-full font-bold">Upload Video</button>
                    </div>`;
                } else {
                    main.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">${videos.map(v => `
                        <div class="cursor-pointer" onclick='renderView("watch", ${JSON.stringify(v)})'>
                            <div class="w-full aspect-video bg-[#272727] rounded-xl overflow-hidden">
                                ${v.thumbnail ? `<img src="${v.thumbnail}" class="w-full h-full object-cover">` : '<div class="flex items-center justify-center h-full"><i data-lucide="film"></i></div>'}
                            </div>
                            <h3 class="font-semibold text-sm mt-2">${v.title}</h3>
                            <p class="text-xs text-gray-400">${v.views} views</p>
                        </div>`).join('')}</div>`;
                }
            } else {
                // Increment view count on watch
                video.views++;
                saveVideos();
                
                main.innerHTML = `<div class="max-w-4xl mx-auto">
                    <div class="aspect-video bg-black rounded-xl overflow-hidden mb-6">
                        <video controls class="w-full h-full" src="${video.localUrl}"></video>
                    </div>
                    <h1 class="text-2xl font-bold mb-2">${video.title}</h1>
                    <div class="flex gap-4 mb-6 text-sm text-gray-400">
                        <span>${video.views} views</span>
                        <button onclick="toggleLike(${video.id})" class="flex items-center gap-1 hover:text-white"><i data-lucide="thumbs-up"></i> ${video.likes}</button>
                        <button class="flex items-center gap-1 hover:text-white"><i data-lucide="user-plus"></i> Subscribe</button>
                    </div>
                    <div class="border-t border-[#303030] pt-6">
                        <h3 class="font-bold mb-4">Comments (${video.comments.length})</h3>
                        <div class="flex gap-2 mb-6">
                            <input id="comment-input" type="text" placeholder="Add a comment..." class="flex-1 bg-[#121212] border border-[#303030] p-2 rounded">
                            <button onclick="addComment(${video.id})" class="bg-[#272727] px-4 rounded hover:bg-[#3d3d3d]">Post</button>
                        </div>
                        <div class="space-y-4">
                            ${video.comments.map(c => `<div class="bg-[#1e1e1e] p-3 rounded text-sm">${c}</div>`).join('')}
                        </div>
                    </div>
                    <button onclick="renderView('home')" class="mt-8 px-4 py-2 bg-[#272727] rounded-full">Back Home</button>
                </div>`;
            }
            lucide.createIcons();
        }

        window.onload = () => renderView('home');
    </script>
</body>
</html>
